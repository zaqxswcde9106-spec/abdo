<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<style>
:root{--box:#ff4d6d;--lid:#c9184a;--rib:#ffb703;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0d1a;height:100vh;display:flex;align-items:center;justify-content:center;perspective:1800px;overflow:hidden;font-family:'Segoe UI',sans-serif;}

/* الكورة النورانية اللي بتدور حوالين الهدية - خارج المشهد تماماً */
.orb-ring{
  position:fixed;
  width:260px;height:260px;
  top:50%;left:50%;
  margin:-130px 0 0 -130px;
  pointer-events:none;
  z-index:5;
  animation:ringRotate 2.5s linear infinite;
  opacity:1;
  transition:opacity 0.5s;
}
.orb-ring.hidden{opacity:0;}

@keyframes ringRotate{
  from{transform:rotateX(70deg) rotateZ(0deg);}
  to  {transform:rotateX(70deg) rotateZ(360deg);}
}

.orb-dot{
  position:absolute;
  width:22px;height:22px;
  border-radius:50%;
  top:50%;left:50%;
  background:radial-gradient(circle,#fff 0%,#ffe066 40%,#ff9900 100%);
  box-shadow:0 0 18px 8px #ffe066, 0 0 40px 18px #ff9900, 0 0 70px 30px rgba(255,200,0,0.4);
  transform-origin:0 0;
}
.orb-dot:nth-child(1){transform:rotate(0deg)   translateX(110px) translate(-50%,-50%);}
.orb-dot:nth-child(2){transform:rotate(120deg)  translateX(110px) translate(-50%,-50%);}
.orb-dot:nth-child(3){transform:rotate(240deg)  translateX(110px) translate(-50%,-50%);}

/* هالة توهج حول الصندوق */
.box-glow{
  position:fixed;
  width:220px;height:220px;
  top:50%;left:50%;
  margin:-110px 0 0 -110px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,210,0,0.18) 0%,rgba(255,120,0,0.08) 55%,transparent 75%);
  pointer-events:none;
  z-index:3;
  animation:glowPulse 1.8s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{transform:scale(1);opacity:0.7;}
  50%{transform:scale(1.25);opacity:1;}
}

.scene{
  position:relative;
  width:150px;height:150px;
  transform-style:preserve-3d;
  transform:rotateX(-25deg) rotateY(30deg);
  transition:transform 1.2s ease;
  z-index:10;
}
.container{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  cursor:pointer;
}
.container.open{
  animation:spinOpen 1.6s forwards cubic-bezier(.69,-.01,.11,1.01);
}
@keyframes spinOpen{
  0%  {transform:rotateY(0) scale(1);}
  50% {transform:rotateY(1800deg) scale(1.4) translateZ(80px);}
  100%{transform:rotateY(3600deg) scale(0.85) rotateX(8deg);}
}

.side{position:absolute;width:150px;height:150px;background:var(--box);border:1px solid rgba(0,0,0,0.12);}
.side::before{content:'';position:absolute;width:28px;height:100%;background:var(--rib);left:50%;transform:translateX(-50%);}
.front {transform:translateZ(75px);}
.back  {transform:rotateY(180deg) translateZ(75px);}
.left  {transform:rotateY(-90deg) translateZ(75px);}
.right {transform:rotateY(90deg)  translateZ(75px);}
.bottom{transform:rotateX(-90deg) translateZ(75px);background:#222;}

.lid{
  position:absolute;width:160px;height:160px;
  top:-5px;left:-5px;
  transform-style:preserve-3d;
  transform:translateY(-80px) rotateX(90deg);
}
.lid-top{
  position:absolute;width:100%;height:100%;
  background:var(--lid);transform:translateZ(20px);
  transform-style:preserve-3d;border-radius:4px;
}
.lid-top::before{content:'';position:absolute;width:28px;height:100%;background:var(--rib);left:50%;transform:translateX(-50%);}
.lid-top::after{content:'';position:absolute;width:100%;height:28px;top:50%;transform:translateY(-50%);background:var(--rib);}
.edge{position:absolute;background:var(--lid);border:1px solid rgba(0,0,0,0.1);border-radius:3px;}
.e-f{width:160px;height:20px;bottom:0;transform:rotateX(90deg);transform-origin:bottom;}
.e-b{width:160px;height:20px;top:0;transform:rotateX(-90deg);transform-origin:top;}
.e-r{width:20px;height:160px;right:0;transform:rotateY(-90deg);transform-origin:right;}
.e-l{width:20px;height:160px;left:0;transform:rotateY(90deg);transform-origin:left;}

.open .lid{animation:lidFly 1s forwards ease-in;}
@keyframes lidFly{
  0%  {transform:translateY(-80px) rotateX(90deg) scale(1);opacity:1;}
  100%{transform:translateY(-700px) rotateX(90deg) rotateZ(30deg) scale(0.3);opacity:0;}
}

.inner-orb{
  position:absolute;
  width:36px;height:36px;
  border-radius:50%;
  left:50%;top:50%;
  margin-left:-18px;margin-top:-18px;
  background:radial-gradient(circle,#fff 0%,#ffe066 45%,#ff9900 100%);
  box-shadow:0 0 25px 12px #ffe066, 0 0 55px 25px rgba(255,180,0,0.5);
  transform:translateZ(0) scale(0);
  opacity:0;z-index:20;
}
.open .inner-orb{animation:innerOrbPop 1.4s forwards 0.6s ease-out;}
@keyframes innerOrbPop{
  0%  {transform:translateZ(0) scale(0);opacity:0;}
  40% {transform:translateZ(80px) scale(2);opacity:1;}
  80% {transform:translateZ(200px) scale(1.2);opacity:0.7;}
  100%{transform:translateZ(350px) scale(0);opacity:0;}
}

.flash{
  position:fixed;inset:0;
  background:radial-gradient(circle at center,rgba(255,240,150,0.95) 0%,rgba(255,180,0,0.4) 40%,transparent 70%);
  opacity:0;pointer-events:none;z-index:200;
}
.flash.boom{animation:flashBoom 0.6s forwards;}
@keyframes flashBoom{
  0%{opacity:0;}30%{opacity:1;}100%{opacity:0;}
}

.message{
  position:fixed;
  width:300px;
  background:linear-gradient(135deg,#ffffff 0%,#fff0f5 100%);
  left:50%;top:50%;
  transform:translate(-50%,-50%) scale(0);
  opacity:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:28px;padding:30px 24px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 80px rgba(255,183,3,0.25);
  border:7px solid var(--rib);
  z-index:300;
  pointer-events:none;
}
.message.show{
  animation:cardPop 0.7s forwards cubic-bezier(0.175,0.885,0.32,1.275), cardShake 3s infinite alternate ease-in-out 0.8s;
}
@keyframes cardPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0) rotateX(0deg);}
  100%{opacity:1;transform:translate(-50%,-60%) scale(1) rotateX(18deg);}
}
@keyframes cardShake{
  0%  {transform:translate(-50%,-60%) rotateX(18deg) rotate(-1.5deg) scale(1);}
  50% {transform:translate(-50%,-60%) rotateX(18deg) rotate(0deg) scale(1.03);}
  100%{transform:translate(-50%,-60%) rotateX(18deg) rotate(1.5deg) scale(1);}
}

.hint{
  position:absolute;bottom:-130px;left:50%;
  transform:translateX(-50%);
  color:#fff;white-space:nowrap;
  font-size:1.4rem;
  text-shadow:0 0 16px #ff4d6d;
  animation:floatHint 2s infinite alternate ease-in-out;
}
@keyframes floatHint{
  from{transform:translateX(-50%) translateY(0);}
  to{transform:translateX(-50%) translateY(-12px);}
}
</style>
</head>
<body>

<div class="orb-ring" id="orbRing">
  <div class="orb-dot"></div>
  <div class="orb-dot"></div>
  <div class="orb-dot"></div>
</div>

<div class="box-glow" id="boxGlow"></div>
<div class="flash" id="flash"></div>
<audio id="bdayAudio" src="so1.mp3"></audio>
<audio id="bdayAudio2" src="so2.mp3" preload="auto"></audio>

<div class="message" id="msg">
  <img src="1000083800.jpeg" style="width: 200px; height: 200px; border-radius: 30%; margin-bottom: 16px; box-shadow: 0 0 12px rgba(0,0,0,0.2); border: 4px solid var(--rib);">
  <h1 style="color:#ff4d6d;font-size:2.4rem;text-shadow:1px 1px 0 rgba(0,0,0,0.1);">Happy 16th! 🎂</h1>
  <h2 style="color:#333;margin:12px 0;font-size:1.3rem;">سنة سعيدة يا عبود🎉</h2>
  <p style="font-size:1.3rem;color:#555;">🤗 وعقبال 100 سنة في فرح يا قلبى 🥰</p>
  <div style="border-top:3px double #ffb703;width:70%;margin:18px 0;"></div>
  <p style="font-size:1rem;color:#888;">🥰 بكل حب من أخوك 🥰</p>
  <p style="font-size:1.7rem;font-weight:bold;color:#c9184a;margin-top:6px;">إبراهيم</p>
</div>

<div class="scene" id="scene">
  <div class="container" id="box" onclick="startSurprise()">
    <div class="side front"></div>
    <div class="side back"></div>
    <div class="side left"></div>
    <div class="side right"></div>
    <div class="side bottom"></div>
    <div class="inner-orb"></div>
    <div class="lid">
      <div class="lid-top">
        <div class="edge e-f"></div>
        <div class="edge e-b"></div>
        <div class="edge e-r"></div>
        <div class="edge e-l"></div>
      </div>
    </div>
    <div class="hint">✨ اضغط هنا 🎁</div>
  </div>
</div>

<script>
function startSurprise(){
  const box=document.getElementById('box');
  if(box.classList.contains('open')) return;
  box.classList.add('open');

  const scene=document.getElementById('scene');
  const orbRing=document.getElementById('orbRing');
  const boxGlow=document.getElementById('boxGlow');
  const flash=document.getElementById('flash');
  const msg=document.getElementById('msg');

  setTimeout(()=>{ orbRing.classList.add('hidden'); boxGlow.style.opacity='0'; },400);
  setTimeout(()=>{ scene.style.transform='rotateX(0deg) rotateY(0deg)'; },900);
  setTimeout(()=>{ flash.classList.add('boom'); },1100);

  setTimeout(()=>{
    var end=Date.now()+5000;
    var iv=setInterval(()=>{
      if(Date.now()>end)return clearInterval(iv);
      var p=50*((end-Date.now())/5000);
      confetti({particleCount:p,spread:360,startVelocity:32,ticks:60,zIndex:500,origin:{x:Math.random()*0.4+0.1,y:Math.random()-0.2}});
      confetti({particleCount:p,spread:360,startVelocity:32,ticks:60,zIndex:500,origin:{x:Math.random()*0.4+0.5,y:Math.random()-0.2}});
    },250);
  },1100);

  setTimeout(()=>{ msg.classList.add('show'); },1500);
  // setTimeout(()=>{ document.getElementById('bdayAudio2').play(); },1500);
  // setTimeout(()=>{ document.getElementById('bdayAudio').play(); },1500);
  const audio1 = document.getElementById('bdayAudio');
  const audio2 = document.getElementById('bdayAudio2');
  audio1.loop = false;
  audio2.loop = false;
  audio2.load();
  audio1.play();
  let count = 0;
  audio1.addEventListener('ended', function() {
    count = 0;
    audio2.currentTime = 0;
    audio2.play();
  });
  audio2.addEventListener('ended', function() {
    count++;
    if (count < 2) {
      audio2.currentTime = 0;
      audio2.play();
    }
});
  // إخفاء الصندوق بعد ظهور الرسالة
  setTimeout(()=>{
    const sc=document.getElementById('scene');
    sc.style.transition='opacity 0.8s ease';
    sc.style.opacity='0';
    setTimeout(()=>{ sc.style.display='none'; },800);
  },2100);

  // لحن Happy Birthday
  try {
    // const ctx=new (window.AudioContext||window.webkitAudioContext)();
    // const melody=[
    //   [264,0],[264,0.375],[296,0.5],[264,1],[352,1.5],[330,2],
    //   [264,3],[264,3.375],[296,3.5],[264,4],[396,4.5],[352,5],
    //   [264,6],[264,6.375],[528,6.5],[440,7],[352,7.5],[330,8],[296,8.5],
    //   [470,9],[470,9.375],[440,9.5],[352,10],[396,10.5],[352,11]
    // ];
    melody.forEach(([freq,t])=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type='triangle';
      osc.frequency.value=freq;
      gain.gain.setValueAtTime(0,ctx.currentTime+t);
      gain.gain.linearRampToValueAtTime(0.3,ctx.currentTime+t+0.05);
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+t+0.32);
      osc.start(ctx.currentTime+t);
      osc.stop(ctx.currentTime+t+0.35);
    });
  } catch(e){}
}

document.addEventListener('mousedown',e=>{
  if(document.getElementById('box').classList.contains('open')){
    confetti({particleCount:25,spread:55,origin:{x:e.clientX/innerWidth,y:e.clientY/innerHeight},zIndex:9999,colors:['#ff4d6d','#ffb703','#fff']});
  }
});
</script>
</body>
</html>
